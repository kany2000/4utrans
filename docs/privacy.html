  <h1>隐私政策</h1>
  <p><strong>QuickTranslate</strong> 是一款免费开源的 Chrome 翻译扩展。</p>
  <h2>数据收集</h2>
  <p>本扩展不会收集、存储或与第三方共享任何用户个人信息。</p>
  <p>翻译时，用户选中的网页文字会被发送至 Google Translate、Microsoft Translator 或 GLM API 进行处理，这些服务的数据使用受其各自隐私政策的约束。</p>
  <h2>本地存储</h2>
  <p>用户的设置和翻译历史记录仅保存在本地设备上，不会同步至任何服务器。</p>
  <h2>联系我们</h2>
  <p>如有疑问，请通过 GitHub Issues 联系：<br>
  https://github.com/kany2000/QuickTranslate/issues</p>
</body>
</html>
