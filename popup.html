<!DOCTYPE html>
<html>
<head>
  <title>智能網頁翻譯助手</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 標題區域 -->
    <div class="header">
      <h1 class="title">智能網頁翻譯助手</h1>
      <div class="version">v2.0.0</div>
    </div>

    <!-- 主要操作區域 -->
    <div class="main-section">
      <button id="start-capture" class="primary-btn">
        <span class="btn-icon">📷</span>
        <span class="btn-text">開始翻譯</span>
      </button>

      <div class="quick-info">
        <small>拖拽選擇區域，自動識別並翻譯文字</small>
        <div class="shortcut-hints">
          <small>默認快捷鍵：Alt+1 智能翻譯（自動檢測語言翻譯成目標語言）</small>
        </div>
      </div>
    </div>

    <!-- 設置區域 -->
    <div class="settings-section">
      <div class="setting-group">
        <label for="target-language">目標語言:</label>
        <select id="target-language" class="setting-select">
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">簡體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="ocr-language">識別語言:</label>
        <select id="ocr-language" class="setting-select">
          <option value="auto">自動檢測 (推薦)</option>
          <option value="eng">English</option>
          <option value="chi_tra">繁體中文</option>
          <option value="chi_sim">簡體中文</option>
          <option value="jpn">日本語</option>
          <option value="kor">한국어</option>
          <option value="fra">Français</option>
          <option value="deu">Deutsch</option>
          <option value="spa">Español</option>
        </select>
      </div>

      <!-- 快速保存按鈕 -->
      <div class="quick-save-section">
        <button id="quick-save" class="save-btn">
          <span class="btn-icon">💾</span>
          <span class="btn-text">保存設置</span>
        </button>
      </div>
    </div>

    <!-- 狀態區域 -->
    <div class="status-section">
      <div id="status-message" class="status-message"></div>
    </div>

    <!-- 底部操作 -->
    <div class="footer">
      <button id="settings-btn" class="secondary-btn">
        <span class="btn-icon">⚙️</span>
        <span class="btn-text">高級設置</span>
      </button>
    </div>
  </div>

  <!-- 高級設置模態框 -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>高級設置</h3>
        <button id="close-settings" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="api-provider">翻譯服務:</label>
          <select id="api-provider" class="setting-select">
            <option value="google">Google Translate (推薦)</option>
            <option value="microsoft">Microsoft Translator</option>
            <option value="offline">離線翻譯</option>
            <option value="glm">GLM 大模型 (智譜)</option>
            <option value="custom">LLM 自定義 (OpenAI 兼容)</option>
          </select>
        </div>

        <div class="setting-group api-key-group hidden">
          <label for="api-key">API Key:</label>
          <input type="password" id="api-key" class="setting-input" placeholder="輸入您的API密鑰">
          <small class="help-text">API密鑰將安全存儲在本地</small>
        </div>

        <div id="llm-custom-config" class="hidden">
          <div class="setting-group">
            <label for="llm-base-url">Base URL:</label>
            <input type="text" id="llm-base-url" class="setting-input" placeholder="https://api.openai.com/v1">
            <small class="help-text">OpenAI 兼容的 API 地址</small>
          </div>
          <div class="setting-group">
            <label for="llm-model">模型名稱:</label>
            <select id="llm-model" class="setting-select">
              <option value="">-- 請先填寫 API Key 和 Base URL --</option>
            </select>
            <input type="text" id="llm-model-custom" class="setting-input hidden" placeholder="或直接輸入模型名稱">
            <small class="help-text" id="llm-model-help">選擇可用模型，或直接輸入模型名稱</small>
          </div>
          <div class="setting-group">
            <button type="button" id="fetch-models" class="secondary-btn">🔄 獲取可用模型</button>
          </div>
        </div>

        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="quick-panel-enabled" class="setting-checkbox">
            <span class="checkmark"></span>
            啟用快捷翻譯面板 (選中文字即可翻譯)
          </label>
          <small class="help-text">選中網頁文字後自動顯示翻譯按鈕</small>
        </div>

        <div class="setting-group" id="min-selection-group">
          <label for="min-selection-length">最小選擇字數:</label>
          <input type="number" id="min-selection-length" class="setting-input" 
                 min="1" max="20" value="2" placeholder="2">
          <small class="help-text">選擇少於此字數不會觸發翻譯按鈕</small>
        </div>

        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="auto-copy" class="setting-checkbox">
            <span class="checkmark"></span>
            自動複製翻譯結果
          </label>
        </div>

        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-confidence" class="setting-checkbox">
            <span class="checkmark"></span>
            顯示識別信心度
          </label>
        </div>

        <div class="setting-group">
          <label for="shortcut-key">快捷鍵設置:</label>
          <div class="shortcut-setting">
            <input type="text" id="shortcut-key" class="setting-input shortcut-input"
                   value="Alt+1" readonly placeholder="點擊設置快捷鍵">
            <button id="change-shortcut" class="shortcut-btn">修改</button>
          </div>
          <small class="help-text">使用快捷鍵快速啟動截圖翻譯</small>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-settings" class="primary-btn">保存設置</button>
        <button id="reset-settings" class="secondary-btn">重置</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
